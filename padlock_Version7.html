<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kłódka</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  .lock-wrap {
    animation: floatOnce 1.3s cubic-bezier(0.45, 0, 0.55, 1) forwards;
  }

  @keyframes floatOnce {
    0%   { transform: translateY(0px);   }
    35%  { transform: translateY(-22px); }
    55%  { transform: translateY(-22px); }
    100% { transform: translateY(0px);   }
  }

  svg {
    width: 220px;
    height: 260px;
    overflow: visible;
    filter: drop-shadow(0 16px 40px rgba(255,185,0,0.22));
  }

  #shackle {
    transform-origin: 148px 128px;
    transform: rotate(0deg) scaleX(1);
    animation: unlock 0.85s cubic-bezier(0.4, 0, 0.2, 1) 0.2s forwards;
  }

  @keyframes unlock {
    0%   { transform: rotate(0deg)   scaleX(1);  }
    22%  { transform: rotate(10deg)  scaleX(1);  }
    26%  { transform: rotate(12deg)  scaleX(1);  }
    58%  { transform: rotate(10deg)  scaleX(0);  }
    100% { transform: rotate(0deg)   scaleX(-1); }
  }
</style>
</head>
<body>

<div class="lock-wrap">
<svg viewBox="48 38 160 205" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFE04D"/>
      <stop offset="100%" stop-color="#C97000"/>
    </linearGradient>
    <linearGradient id="shackleFace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#E09000"/>
      <stop offset="45%"  stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#E09000"/>
    </linearGradient>
    <clipPath id="bodyClip">
      <rect x="56" y="125" width="116" height="100" rx="16"/>
    </clipPath>
  </defs>

  <g id="shackle">
    <path d="M76,128 L76,90 A36,36 0 0,1 148,90 L148,128"
          fill="none" stroke="#8B5000" stroke-width="26" stroke-linecap="butt"/>
    <path d="M76,128 L76,90 A36,36 0 0,1 148,90 L148,128"
          fill="none" stroke="url(#shackleFace)" stroke-width="19" stroke-linecap="butt"/>
    <path d="M88,118 L88,90 A24,24 0 0,1 136,90 L136,118"
          fill="none" stroke="#FFE980" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <rect x="56" y="130" width="116" height="100" rx="16" fill="#8B5000"/>
  <rect x="56" y="125" width="116" height="100" rx="16" fill="url(#bodyFace)"/>
  <rect x="64" y="127" width="100" height="10" rx="6" fill="#FFF0A0" opacity="0.35"/>

  <circle cx="72"  cy="137" r="5" fill="#D98000"/>
  <circle cx="72"  cy="137" r="2.5" fill="#FFE04D"/>
  <circle cx="160" cy="137" r="5" fill="#D98000"/>
  <circle cx="160" cy="137" r="2.5" fill="#FFE04D"/>
  <circle cx="72"  cy="213" r="5" fill="#D98000"/>
  <circle cx="72"  cy="213" r="2.5" fill="#FFE04D"/>
  <circle cx="160" cy="213" r="5" fill="#D98000"/>
  <circle cx="160" cy="213" r="2.5" fill="#FFE04D"/>

  <circle cx="114" cy="163" r="16" fill="#B87000"/>
  <circle cx="114" cy="163" r="13" fill="#7a4500"/>
  <circle cx="114" cy="160" r="8"  fill="#3a2000"/>
  <rect   x="110" y="167"  width="8" height="15" rx="3.5" fill="#3a2000"/>
  <circle cx="111" cy="157" r="2.5" fill="#B87000" opacity="0.6"/>

  <rect x="56" y="152" width="116" height="5" fill="#C97800" opacity="0.4" clip-path="url(#bodyClip)"/>
</svg>
</div>

</body>
</html>
